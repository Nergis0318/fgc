name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          NAME=fgc-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/fgc ${NAME}
          chmod +x ${NAME}
          tar czf ${NAME}.tar.gz ${NAME}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "fgc-${{ matrix.target }}"
          Copy-Item "target/${{ matrix.target }}/release/fgc.exe" "$name.exe"
          Compress-Archive -Path "$name.exe" -DestinationPath "$name.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: fgc-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true